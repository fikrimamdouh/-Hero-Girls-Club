<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة لبيس البنات</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 30%, #e1bee7 70%, #f3e5f5 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #e91e8c, #9c27b0, #e91e63);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      text-align: center;
      text-shadow: none;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #9c27b0;
      font-weight: 700;
      margin-bottom: 14px;
      text-align: center;
    }

    .game-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 900px;
    }

    /* ---- Canvas Panel ---- */
    .canvas-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #canvas {
      border-radius: 24px;
      border: 4px solid #ce93d8;
      background: linear-gradient(180deg, #fff9fe 0%, #fce4ec 100%);
      box-shadow: 0 8px 32px rgba(156,39,176,0.18);
    }

    .canvas-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 9px 18px;
      border-radius: 50px;
      border: none;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
    .btn:active { transform: scale(0.97); }

    .btn-save {
      background: linear-gradient(135deg, #e91e8c, #9c27b0);
      color: white;
    }

    .btn-reset {
      background: linear-gradient(135deg, #ff7043, #e91e63);
      color: white;
    }

    /* ---- Options Panel ---- */
    .options-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-width: 260px;
      max-width: 420px;
    }

    /* Category tabs */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .cat-btn {
      padding: 7px 14px;
      border-radius: 50px;
      border: 2.5px solid #e1bee7;
      background: white;
      color: #7b1fa2;
      font-weight: 800;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }
    .cat-btn:hover { background: #f3e5f5; }
    .cat-btn.active {
      background: linear-gradient(135deg, #e91e8c, #9c27b0);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(233,30,140,0.35);
      transform: scale(1.05);
    }

    /* Options grid */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: white;
      border-radius: 20px;
      padding: 12px;
      border: 2px solid #e1bee7;
      box-shadow: 0 4px 16px rgba(156,39,176,0.08);
      min-height: 180px;
    }

    .option-item {
      border-radius: 14px;
      border: 2.5px solid #f3e5f5;
      background: #fce4ec22;
      cursor: pointer;
      transition: all 0.18s;
      overflow: hidden;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option-item:hover { border-color: #ce93d8; background: #f3e5f5; transform: scale(1.05); }
    .option-item.selected {
      border-color: #e91e8c;
      background: #fce4ec;
      box-shadow: 0 0 0 3px rgba(233,30,140,0.25);
    }
    .option-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* none option */
    .option-none {
      font-size: 1.5rem;
      font-weight: 900;
      color: #bdbdbd;
    }

    /* loading */
    .loading {
      grid-column: 1/-1;
      text-align: center;
      color: #9c27b0;
      font-weight: 700;
      padding: 30px 0;
      font-size: 1.1rem;
    }

    /* Applied items */
    .applied-label {
      font-weight: 800;
      color: #7b1fa2;
      font-size: 0.8rem;
      text-align: center;
    }

    /* Save notification */
    #save-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #e91e8c, #9c27b0);
      color: white;
      font-weight: 800;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(233,30,140,0.4);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      z-index: 100;
      pointer-events: none;
      text-align: center;
    }
    #save-toast.show { transform: translateX(-50%) translateY(0); }

    /* Attribution */
    .attr {
      margin-top: 14px;
      font-size: 0.65rem;
      color: #bdbdbd;
      text-align: center;
    }
    .attr a { color: #ce93d8; }

    @media (max-width: 600px) {
      h1 { font-size: 1.4rem; }
      #canvas { width: 220px !important; height: 380px !important; }
    }
  </style>
</head>
<body>

  <h1>👗 لعبة لبيس البنات 👗</h1>
  <p class="subtitle">صمّمي أميرتك الخاصة! اختاري الملابس والشعر والإكسسوارات ✨</p>

  <div class="game-container">

    <!-- Canvas side -->
    <div class="canvas-panel">
      <canvas id="canvas" width="270" height="470"></canvas>
      <div class="canvas-btns">
        <button class="btn btn-save" onclick="saveImage()">📸 احفظي لوكك</button>
        <button class="btn btn-reset" onclick="resetDoll()">🔄 ابدأي من جديد</button>
      </div>
    </div>

    <!-- Options side -->
    <div class="options-panel">
      <!-- Category Tabs -->
      <div class="categories">
        <button class="cat-btn active" data-cat="hair" onclick="selectCategory('hair', this)">💇 الشعر</button>
        <button class="cat-btn" data-cat="dress" onclick="selectCategory('dress', this)">👗 الفستان</button>
        <button class="cat-btn" data-cat="face" onclick="selectCategory('face', this)">😊 الوجه</button>
        <button class="cat-btn" data-cat="shoes" onclick="selectCategory('shoes', this)">👠 الأحذية</button>
        <button class="cat-btn" data-cat="accessory" onclick="selectCategory('accessory', this)">💍 الإكسسوار</button>
      </div>

      <!-- Options Grid -->
      <div class="options-grid" id="options-grid">
        <div class="loading">⏳ جاري التحميل...</div>
      </div>

      <p class="applied-label">انقري على أي خيار لتطبيقه على الدمية ✨</p>
    </div>
  </div>

  <p class="attr">
    الأصول مرخصة بـ MIT من
    <a href="https://github.com/wolfderechter/DollMaker" target="_blank">DollMaker</a>
  </p>

  <!-- Toast -->
  <div id="save-toast">✅ تم حفظ الصورة!</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // ---- State ----
  const CATEGORIES = {
    hair:      { count: 6,  label: 'الشعر' },
    dress:     { count: 9,  label: 'الفستان' },
    face:      { count: 2,  label: 'الوجه' },
    shoes:     { count: 5,  label: 'الأحذية' },
    accessory: { count: 4,  label: 'الإكسسوار' },
  };

  let currentCat = 'hair';
  let selected = { hair: null, dress: null, face: null, shoes: null, accessory: null };

  // ---- Image cache ----
  const imgCache = {};
  function loadImg(src) {
    if (imgCache[src]) return imgCache[src];
    const img = new Image();
    img.src = src;
    imgCache[src] = img;
    return img;
  }

  // ---- Preload all images ----
  function preloadAll() {
    const bodyImg = loadImg('/dress-up/images/body/0.png');
    Object.keys(CATEGORIES).forEach(cat => {
      for (let i = 0; i < CATEGORIES[cat].count; i++) {
        loadImg(`/dress-up/images/${cat}/${i}.png`);
      }
    });
  }
  preloadAll();

  // ---- Draw ----
  function drawDoll() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const drawImg = (src) => {
      const img = loadImg(src);
      const doIt = () => {
        ctx.drawImage(img, 10, 10, canvas.width - 20, canvas.height - 20);
      };
      if (img.complete) {
        doIt();
      } else {
        img.onload = () => {
          drawDoll(); // re-draw when loaded
        };
      }
    };

    // Draw layers in order
    drawImg('/dress-up/images/body/0.png');

    const order = ['face', 'hair', 'dress', 'shoes', 'accessory'];
    order.forEach(cat => {
      if (selected[cat] !== null) {
        drawImg(`/dress-up/images/${cat}/${selected[cat]}.png`);
      }
    });
  }

  // ---- Category ----
  function selectCategory(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOptions();
  }

  // ---- Render options grid ----
  function renderOptions() {
    const grid = document.getElementById('options-grid');
    const cat = currentCat;
    const count = CATEGORIES[cat].count;
    grid.innerHTML = '';

    // "None" option
    const noneItem = document.createElement('div');
    noneItem.className = 'option-item ' + (selected[cat] === null ? 'selected' : '');
    noneItem.innerHTML = '<span class="option-none">✕</span>';
    noneItem.title = 'بدون';
    noneItem.onclick = () => {
      selected[cat] = null;
      renderOptions();
      drawDoll();
    };
    grid.appendChild(noneItem);

    for (let i = 0; i < count; i++) {
      const src = `/dress-up/images/${cat}/${i}.png`;
      const item = document.createElement('div');
      item.className = 'option-item ' + (selected[cat] === i ? 'selected' : '');

      const img = document.createElement('img');
      img.src = src;
      img.alt = `${CATEGORIES[cat].label} ${i + 1}`;
      item.appendChild(img);

      const idx = i;
      item.onclick = () => {
        selected[cat] = idx;
        renderOptions();
        drawDoll();
      };
      grid.appendChild(item);
    }
  }

  // ---- Save ----
  function saveImage() {
    // Rebuild full canvas for saving
    const saveCanvas = document.createElement('canvas');
    saveCanvas.width = 400;
    saveCanvas.height = 600;
    const sCtx = saveCanvas.getContext('2d');

    const layerSrcs = ['/dress-up/images/body/0.png'];
    ['face', 'hair', 'dress', 'shoes', 'accessory'].forEach(cat => {
      if (selected[cat] !== null) layerSrcs.push(`/dress-up/images/${cat}/${selected[cat]}.png`);
    });

    let loaded = 0;
    const imgs = layerSrcs.map(src => {
      const im = new Image();
      im.src = src;
      im.onload = () => {
        loaded++;
        if (loaded === imgs.length) {
          imgs.forEach(i => sCtx.drawImage(i, 20, 20, 360, 560));
          const link = document.createElement('a');
          link.download = 'اميرتي.png';
          link.href = saveCanvas.toDataURL('image/png');
          link.click();
          showToast('✅ تم حفظ صورة الأميرة!');
        }
      };
      return im;
    });
  }

  // ---- Reset ----
  function resetDoll() {
    selected = { hair: null, dress: null, face: null, shoes: null, accessory: null };
    renderOptions();
    drawDoll();
  }

  // ---- Toast ----
  function showToast(msg) {
    const t = document.getElementById('save-toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ---- Init ----
  window.addEventListener('load', () => {
    renderOptions();
    drawDoll();
  });
</script>
</body>
</html>
