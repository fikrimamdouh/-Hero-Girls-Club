<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لبيس حفلة الأحلام</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;overflow-x:hidden;background:linear-gradient(135deg,#fff8e1 0%,#fce4ec 40%,#e8eaf6 70%,#fff3e0 100%)}
    h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#f57f17,#e91e63,#512da8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;text-align:center}
    .subtitle{font-size:.85rem;color:#e65100;font-weight:700;margin-bottom:14px;text-align:center}
    .deco{font-size:2rem;text-align:center;margin-bottom:4px}
    .game-container{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:flex-start;width:100%;max-width:900px}
    .canvas-panel{display:flex;flex-direction:column;align-items:center;gap:10px}
    #canvas{border-radius:24px;border:4px solid #ff8a65;background:linear-gradient(180deg,#fff8e1,#fce4ec);box-shadow:0 8px 32px rgba(245,127,23,.25)}
    .canvas-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .btn{padding:9px 18px;border-radius:50px;border:none;font-weight:800;font-size:.85rem;cursor:pointer;transition:all .18s;font-family:inherit}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.15)}
    .btn-save{background:linear-gradient(135deg,#f57f17,#e91e63);color:white}
    .btn-reset{background:linear-gradient(135deg,#512da8,#e91e63);color:white}
    .options-panel{display:flex;flex-direction:column;gap:10px;flex:1;min-width:260px;max-width:420px}
    .categories{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
    .cat-btn{padding:7px 14px;border-radius:50px;border:2.5px solid #ffcc80;background:white;color:#e65100;font-weight:800;font-size:.8rem;cursor:pointer;transition:all .18s;font-family:inherit}
    .cat-btn:hover{background:#fff8e1}
    .cat-btn.active{background:linear-gradient(135deg,#f57f17,#e91e63);color:white;border-color:transparent;box-shadow:0 4px 12px rgba(245,127,23,.35);transform:scale(1.05)}
    .options-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:white;border-radius:20px;padding:12px;border:2px solid #ffcc80;box-shadow:0 4px 16px rgba(245,127,23,.1);min-height:180px}
    .option-item{border-radius:14px;border:2.5px solid #fff8e1;background:#fff8e120;cursor:pointer;transition:all .18s;overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
    .option-item:hover{border-color:#ff8a65;background:#fff8e1;transform:scale(1.05)}
    .option-item.selected{border-color:#f57f17;background:#fff8e1;box-shadow:0 0 0 3px rgba(245,127,23,.25)}
    .option-item img{width:100%;height:100%;object-fit:contain}
    .option-none{font-size:1.5rem;font-weight:900;color:#bdbdbd}
    .applied-label{font-weight:800;color:#e65100;font-size:.8rem;text-align:center}
    #save-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,#f57f17,#e91e63);color:white;font-weight:800;padding:12px 28px;border-radius:50px;font-size:.9rem;box-shadow:0 8px 24px rgba(245,127,23,.4);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:100;pointer-events:none;text-align:center}
    #save-toast.show{transform:translateX(-50%) translateY(0)}
    .attr{margin-top:14px;font-size:.65rem;color:#bdbdbd;text-align:center}
    .attr a{color:#ff8a65}
    @media(max-width:600px){h1{font-size:1.4rem}#canvas{width:220px!important;height:380px!important}}
  </style>
</head>
<body>
  <div class="deco">🎉🎊🎈🎊🎉</div>
  <h1>لبيس حفلة الأحلام</h1>
  <p class="subtitle">صمّمي إطلالتك المميزة لحفلة لا تُنسى! 🎉✨</p>
  <div class="game-container">
    <div class="canvas-panel">
      <canvas id="canvas" width="270" height="470"></canvas>
      <div class="canvas-btns">
        <button class="btn btn-save" onclick="saveImage()">📸 احفظي لوك الحفلة</button>
        <button class="btn btn-reset" onclick="resetDoll()">🔄 ابدأي من جديد</button>
      </div>
    </div>
    <div class="options-panel">
      <div class="categories">
        <button class="cat-btn active" data-cat="hair" onclick="selectCategory('hair',this)">🎀 الشعر</button>
        <button class="cat-btn" data-cat="dress" onclick="selectCategory('dress',this)">🌟 فستان السهرة</button>
        <button class="cat-btn" data-cat="face" onclick="selectCategory('face',this)">💄 الوجه</button>
        <button class="cat-btn" data-cat="shoes" onclick="selectCategory('shoes',this)">👡 كعب عالي</button>
        <button class="cat-btn" data-cat="accessory" onclick="selectCategory('accessory',this)">💎 مجوهرات</button>
      </div>
      <div class="options-grid" id="options-grid"><div style="grid-column:1/-1;text-align:center;color:#f57f17;font-weight:700;padding:30px 0;font-size:1.1rem">⏳ جاري التحميل...</div></div>
      <p class="applied-label">انقري لاختيار إطلالة الحفلة المثالية 🎉</p>
    </div>
  </div>
  <p class="attr">الأصول مرخصة بـ MIT من <a href="https://github.com/wolfderechter/DollMaker" target="_blank">DollMaker</a></p>
  <div id="save-toast">✅ تم الحفظ!</div>
<script>
  const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');
  const CATS={hair:{count:6},dress:{count:9},face:{count:2},shoes:{count:5},accessory:{count:4}};
  let currentCat='hair';let selected={hair:5,dress:8,face:1,shoes:4,accessory:3};
  const imgCache={};
  function loadImg(src){if(imgCache[src])return imgCache[src];const img=new Image();img.src=src;imgCache[src]=img;return img}
  function preload(){loadImg('/dress-up/images/body/0.png');Object.keys(CATS).forEach(cat=>{for(let i=0;i<CATS[cat].count;i++)loadImg(`/dress-up/images/${cat}/${i}.png`)})}
  preload();
  function drawDoll(){ctx.clearRect(0,0,canvas.width,canvas.height);const draw=src=>{const img=loadImg(src);if(img.complete){ctx.drawImage(img,10,10,canvas.width-20,canvas.height-20)}else{img.onload=()=>drawDoll()}};draw('/dress-up/images/body/0.png');['face','hair','dress','shoes','accessory'].forEach(cat=>{if(selected[cat]!==null)draw(`/dress-up/images/${cat}/${selected[cat]}.png`)})}
  function selectCategory(cat,btn){currentCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderOptions()}
  function renderOptions(){const grid=document.getElementById('options-grid');grid.innerHTML='';const noneItem=document.createElement('div');noneItem.className='option-item '+(selected[currentCat]===null?'selected':'');noneItem.innerHTML='<span class="option-none">✕</span>';noneItem.onclick=()=>{selected[currentCat]=null;renderOptions();drawDoll()};grid.appendChild(noneItem);for(let i=0;i<CATS[currentCat].count;i++){const item=document.createElement('div');item.className='option-item '+(selected[currentCat]===i?'selected':'');const img=document.createElement('img');img.src=`/dress-up/images/${currentCat}/${i}.png`;img.alt=`${currentCat} ${i+1}`;item.appendChild(img);const idx=i;item.onclick=()=>{selected[currentCat]=idx;renderOptions();drawDoll()};grid.appendChild(item)}}
  function saveImage(){const sc=document.createElement('canvas');sc.width=400;sc.height=600;const sCtx=sc.getContext('2d');const srcs=['/dress-up/images/body/0.png'];['face','hair','dress','shoes','accessory'].forEach(cat=>{if(selected[cat]!==null)srcs.push(`/dress-up/images/${cat}/${selected[cat]}.png`)});let loaded=0;const imgs=srcs.map(src=>{const im=new Image();im.src=src;im.onload=()=>{loaded++;if(loaded===imgs.length){imgs.forEach(i=>sCtx.drawImage(i,20,20,360,560));const a=document.createElement('a');a.download='party-look.png';a.href=sc.toDataURL('image/png');a.click();showToast('✅ تم الحفظ!')}};return im})}
  function resetDoll(){selected={hair:5,dress:8,face:1,shoes:4,accessory:3};renderOptions();drawDoll()}
  function showToast(msg){const t=document.getElementById('save-toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
  window.addEventListener('load',()=>{renderOptions();drawDoll()});
</script>
</body>
</html>
