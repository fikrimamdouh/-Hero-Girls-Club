<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تتريس 🧩</title>
  <script src="classic-tetris.js"></script>
  <script>
  window.addEventListener("load", event => {
    const canvas = document.getElementById("tetris-canvas");
    const tetris = new ClassicTetris(canvas);
    document.getElementById("start-stop-btn").addEventListener("click", event => {
      const startLevel = document.getElementById("level-input").value;
      tetris.setStartLevel(startLevel);
      tetris.togglePlayPause();
    });
    document.getElementById("quit-btn").addEventListener("click", event => {
      tetris.quit();
    });
  });
  </script>
  <style>
    body { margin:0; background:#000; display:flex; flex-direction:column; align-items:center; }
    .controls { padding: 10px 20px; background:#111; display:flex; align-items:center; gap:12px; direction:rtl; }
    .controls label { color:#aaa; font-family:Arial; font-size:14px; }
    .controls input { width:60px; padding:4px 8px; border-radius:6px; border:1px solid #333; background:#222; color:white; }
    .controls button { padding:8px 20px; border-radius:8px; border:none; font-weight:900; font-size:14px; cursor:pointer; }
    #start-stop-btn { background: linear-gradient(135deg,#10b981,#059669); color:white; }
    #quit-btn { background:#ef4444; color:white; }
  </style>
</head>
<body>
  <div style="user-select:none; color:#fff; background-color:#000;">
    <div style="display:table; margin:0 auto;">
      <canvas id="tetris-canvas" class="canvas" width="520" height="600"></canvas>
      <div class="controls">
        <label>المستوى:</label>
        <input id="level-input" type="number" min="0" max="19" value="0">
        <button id="start-stop-btn">▶ العب / إيقاف</button>
        <button id="quit-btn">✕ خروج</button>
      </div>
    </div>
  </div>
</body>
</html>
